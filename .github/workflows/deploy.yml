name: Deploy Next.js to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with: { node-version: '20' }

      - name: Build
        run: |
          npm install
          npm run build

      - name: Package
        run: |
          # Faqat kerakli fayllarni yig'ish (Next.js standalone folder)
          cp -r .next/standalone ./deploy-package
          cp -r public ./deploy-package/
          cp -r .next/static ./deploy-package/.next/static
          cd deploy-package && zip -r ../release.zip .

      - name: Copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "release.zip"
          target: "~/erp/temp"

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/erp
            # Eski fayllarni tozalash
            rm -rf .next public server.js package.json node_modules
            # Yangisini ochish
            unzip -o temp/release.zip -d .
            # Eski jarayonni o'chirish va yangisini boshlash
            fuser -k 3001/tcp || true
            nohup node server.js -p 3001 > server.log 2>&1 &