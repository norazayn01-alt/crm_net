name: Deploy Next.js to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build
        run: |
          npm install
          npm run build

      - name: Package
        run: |
          # Standalone papkani tayyorlash
          mkdir -p ./deploy-package
          cp -r .next/standalone/. ./deploy-package/
          if [ -d "public" ]; then cp -r public ./deploy-package/; fi
          cp -r .next/static ./deploy-package/.next/static/
          
          # Arxivlash
          cd deploy-package && zip -r ../release.zip .

      - name: Copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST2 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY2 }}
          source: "release.zip"
          target: "~/erp/temp"

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST2 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY2 }}
          script: |
            cd ~/erp
            
            # 1. Eski fayllarni tozalash (xatolik bermasligi uchun || true)
            rm -rf .next public server.js node_modules .next/static || true
            
            # 2. Yangi fayllarni ochish
            unzip -o temp/release.zip -d .
            
            # 3. Eski jarayonni to'xtatish
            fuser -k 3000/tcp || true
            fuser -k 3001/tcp || true
            
            # 4. Yangisini PORT=3001 bilan ishga tushirish
            PORT=3001 nohup node server.js > server.log 2>&1 &
            
            echo "Deployment muvaffaqiyatli yakunlandi!"