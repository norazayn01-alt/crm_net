name: Deploy

on:
  push:
    branches:
      - main # main branchga push qilinganda ishga tushadi

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/erp
            git pull origin main
            npm install
            npm run build
            # PM2 ishlatayotgan bo'lsangiz quyidagini qoldiring, aks holda tizimni restart qiling
            pm2 restart erp-app || pm2 start npm --name "erp-app" -- run start